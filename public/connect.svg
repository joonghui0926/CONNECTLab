<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#111111"/>

  <!-- C arc: center ≈ (28.6, 32), radius 18 -->
  <!-- From (42, 20) counterclockwise (large arc) to (42, 44) -->
  <path d="M 42 20 A 18 18 0 1 0 42 44"
        fill="none"
        stroke="#fccd4d"
        stroke-width="5.5"
        stroke-linecap="round"/>

  <!-- Network node dots at both tips of the C -->
  <circle cx="42" cy="20" r="4.5" fill="#fccd4d"/>
  <circle cx="42" cy="44" r="4.5" fill="#fccd4d"/>

  <!-- Small center node on left side of C (leftmost point of arc) -->
  <circle cx="11" cy="32" r="2.5" fill="#fccd4d" opacity="0.5"/>
</svg>
